apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fcgi-proxy-example.fullname" . }}-proxy
  labels:
    {{- include "fcgi-proxy-example.labels" . | nindent 4 }}
data:
  # The entire .Values.config subtree is serialized verbatim. Keys use the
  # snake_case names documented in the project README, and any new config
  # option supported by the proxy can be added to values.yaml without
  # touching this template.
  config.json: |
{{ .Values.config | toPrettyJson | indent 4 }}
