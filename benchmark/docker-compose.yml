services:
  php-fpm:
    image: php:8.3-fpm-alpine
    volumes:
      - ./www:/var/www/html:ro
      - ./php-fpm.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - bench

  fcgi-proxy:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - -listen
      - ":8080"
      - -network
      - tcp
      - -address
      - php-fpm:9000
      - -document-root
      - /var/www/html
    ports:
      - "8081:8080"
    depends_on:
      - php-fpm
    networks:
      - bench

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./www:/var/www/html:ro
    ports:
      - "8082:8080"
    depends_on:
      - php-fpm
    networks:
      - bench

networks:
  bench:
